name: Release → GitHub

# ── Как выпустить релиз ────────────────────────────────────────────────────
#   1. Поднять version: в pubspec.yaml (напр. 1.0.2+3), закоммитить, запушить.
#   2. git tag v1.0.2 && git push origin v1.0.2
#   Сборка соберёт 3 APK и сборку под Linux, опубликует релиз — оттуда APK
#   берёт «Проверить обновления» в приложении и Obtainium.
#
#   Вручную (без тега): вкладка Actions → Release → GitHub → Run workflow.
#   Тег и version: в pubspec ДОЛЖНЫ совпадать — иначе сборка падает намеренно.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # публикуем релиз в ЭТОТ же репо

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Cache pub & Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-wickly-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-wickly-

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Секрет KEYSTORE_BASE64 не задан — APK будет подписан debug-ключом и не встанет поверх установленного."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Read version & check tag
        id: ver
        run: |
          LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')   # 1.0.1+2
          NAME=${LINE%%+*}
          CODE=${LINE##*+}
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            if [ "$TAG" != "v$NAME" ]; then
              echo "::error::Тег $TAG не совпадает с версией в pubspec.yaml ($NAME). Поправь pubspec или перевесь тег."
              exit 1
            fi
          else
            TAG="v$NAME"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "Собираем Wickly $NAME (versionCode $CODE), тег $TAG"

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Stage artifacts
        run: |
          mkdir -p dist
          # Имена АССЕТОВ трогать нельзя: update_service.dart ищет в них токен
          # архитектуры (arm64-v8a / armeabi-v7a / x86_64).
          BASE="Wickly-${{ steps.ver.outputs.name }}"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   "dist/${BASE}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/${BASE}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk      "dist/${BASE}-x86_64.apk"
          ls -lh dist/

      - name: Verify release signature
        run: |
          # Gradle молча падает на debug-подпись, если key.properties не
          # подхватился. Такой APK не встанет поверх установленного и разойдётся
          # с уже выпущенными — ловим здесь, а не на телефоне пользователя.
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          for f in dist/Wickly-*.apk; do
            echo "── $f"
            DN=$("$APKSIGNER" verify --print-certs "$f" | grep -m1 'certificate DN')
            echo "$DN"
            case "$DN" in
              *"Android Debug"*)
                echo "::error::$f подписан ДЕБАГ-ключом. Проверь секреты KEYSTORE_*."
                exit 1 ;;
            esac
            echo "$DN" | grep -q 'CN=Wickly' || {
              echo "::error::$f подписан незнакомым ключом: $DN"
              exit 1
            }
          done
          echo "Все APK подписаны релизным ключом."

      - name: Generate changelog
        run: |
          {
            echo "## Wickly ${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})"
            echo ""
            PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ steps.ver.outputs.tag }}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --pretty=format:'- %s' "$PREV_TAG"..HEAD
            else
              git log --no-merges --pretty=format:'- %s' -n 20
            fi
          } > dist/notes.md
          echo "---- заметки ----"; cat dist/notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Wickly ${{ steps.ver.outputs.name }}
          body_path: dist/notes.md
          # Обычный релиз, НЕ pre-release: апдейтер ходит в releases/latest,
          # а тот предрелизы не отдаёт. Нужен предрелиз — поставь prerelease: true.
          prerelease: false
          make_latest: true
          files: dist/Wickly-*.apk

  # Десктоп под Linux: тот же код, другая обёртка. Архив кладётся в тот же
  # релиз и ставится домашним скриптом без root.
  linux:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Системные зависимости сборки
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libcups2-dev

      - name: Read version
        id: ver
        run: |
          LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "name=${LINE%%+*}" >> "$GITHUB_OUTPUT"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build linux
        # gcc, а не clang: clang спотыкается о заголовки свежего libstdc++.
        env:
          CC: gcc
          CXX: g++
        run: flutter build linux --release

      - name: Собрать архив
        run: |
          BUNDLE=build/linux/x64/release/bundle
          cp linux/packaging/install.sh "$BUNDLE/install.sh"
          chmod +x "$BUNDLE/install.sh"
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png "$BUNDLE/wickly.png"
          mkdir -p dist
          tar -czf "dist/Wickly-${{ steps.ver.outputs.name }}-linux-x64.tar.gz" -C "$BUNDLE" .
          ls -lh dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}
          files: dist/Wickly-*-linux-x64.tar.gz
