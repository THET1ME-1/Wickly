name: wickly
description: "Wickly — тёплый личный дневник без аккаунта. Локально, приватно, с P2P-синхронизацией. Material 3 Expressive."
publish_to: 'none'
version: 1.4.1+21

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Material You — динамический цвет из обоев системы (Android 12+).
  dynamic_color: ^1.7.0
  # Хранение выбранного цвета/темы/языка.
  shared_preferences: ^2.2.3
  # Колор-пикер «бесконечных тем» в настройках.
  flutter_colorpicker: ^1.1.0
  # Версия приложения в разделе «О программе».
  package_info_plus: ^8.0.0
  # Ссылка на исходники.
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8
  sqlite_crdt: ^3.0.4
  path_provider: ^2.1.6
  uuid: ^4.6.0
  flutter_secure_storage: ^10.3.1
  cryptography: ^2.9.0

  # --- Медиа в записи ---
  image_picker: ^1.2.3        # фото/видео из галереи и камеры
  image: ^4.8.0               # ресайз и превью без нативных зависимостей
  exif: ^3.3.0                # где и когда снято фото (авто-контекст)
  record: ^6.2.1              # аудио-заметки прямо в записи
  audioplayers: ^6.7.1        # проигрывание аудио-заметок
  video_player: ^2.11.1        # видео внутри записи
  speech_to_text: ^7.4.0      # диктовка → текст

  # --- Авто-контекст ---
  geolocator: ^14.0.2          # координаты записи
  geocoding: ^5.0.0           # координаты → человеческое название места
  http: ^1.6.0                # погода (Open-Meteo, без ключа)
  flutter_map: ^8.3.1         # карта записей (OSM)
  latlong2: ^0.10.1

  # --- Вовлечение ---
  flutter_local_notifications: ^22.0.1  # напоминания писать
  timezone: ^0.11.1                     # расписание напоминаний по локальной зоне
  home_widget: ^0.9.3                  # виджеты на домашнем экране

  # --- Приватность ---
  local_auth: ^3.0.2          # отпечаток / Face ID

  # --- Экспорт и синк ---
  pdf: ^3.12.0                 # «книга» в PDF
  printing: ^5.14.3            # печать и «поделиться» PDF
  share_plus: ^12.0.2
  file_picker: ^11.0.2         # импорт бэкапов и чужих дневников
  open_filex: ^4.7.0
  archive: ^4.0.9             # zip-бэкап с медиа
  xml: ^6.5.0                 # разбор бэкапов Diaro (XML) при импорте
  qr_flutter: ^4.1.0          # сопряжение устройств по QR
  mobile_scanner: ^7.3.0      # чтение QR со второго устройства

  intl: ^0.20.2                # даты и числа по локали
  meta: ^1.17.0               # @visibleForTesting в чистом Dart (без Flutter)
  crypto: ^3.0.7              # хэши медиа-файлов
  flutter_staggered_grid_view: ^0.7.0 # доска записей на широком окне
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.0+3

flutter:
  uses-material-design: true

  # Фирменные шрифты «ДНК». Оба обязательны в каждом нашем приложении.
  fonts:
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded.ttf
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest.ttf
